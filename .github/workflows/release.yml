name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify plugin version matches tag
        run: |
          PLUGIN_VERSION=$(grep -m1 "Version:" lgw-division-widget.php | awk '{print $NF}')
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Plugin header version ($PLUGIN_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version check passed: $PLUGIN_VERSION"

      - name: Build zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIPNAME="lgw-division-widget-v${VERSION}.zip"
          mkdir -p lgw-division-widget
          cp lgw-division-widget.php lgw-division-widget/
          cp lgw-seasons.php         lgw-division-widget/
          cp lgw-scorecards.php      lgw-division-widget/
          cp lgw-scorecard.js        lgw-division-widget/
          cp lgw-scorecard.css       lgw-division-widget/
          cp lgw-export.php          lgw-division-widget/
          cp lgw-cup.php             lgw-division-widget/
          cp lgw-cup.js              lgw-division-widget/
          cp lgw-cup.css             lgw-division-widget/
          cp lgw-champ.php           lgw-division-widget/
          cp lgw-champ.js            lgw-division-widget/
          cp lgw-champ.css           lgw-division-widget/
          cp lgw-draw.php            lgw-division-widget/
          cp lgw-gchamp.php          lgw-division-widget/
          cp lgw-gchamp.js           lgw-division-widget/
          cp lgw-gchamp.css          lgw-division-widget/
          cp lgw-calendar.php        lgw-division-widget/
          cp lgw-calendar.js         lgw-division-widget/
          cp lgw-calendar.css        lgw-division-widget/
          cp lgw-widget.js           lgw-division-widget/
          cp lgw-widget.css          lgw-division-widget/
          cp lgw-admin.js            lgw-division-widget/
          cp lgw-admin.css           lgw-division-widget/
          cp lgw-sc-admin.php        lgw-division-widget/
          cp lgw-players.php         lgw-division-widget/
          cp lgw-drive.php           lgw-division-widget/
          cp lgw-sheets.php          lgw-division-widget/
          cp lgw-pdf.php             lgw-division-widget/
          cp lgw-finals.php          lgw-division-widget/
          cp lgw-finals.js           lgw-division-widget/
          cp lgw-finals.css          lgw-division-widget/
          cp lgw-logo.svg            lgw-division-widget/
          cp readme.txt              lgw-division-widget/
          cp README.md               lgw-division-widget/
          zip -r "$ZIPNAME" lgw-division-widget/
          echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV
          echo "✅ Built $ZIPNAME ($(du -h $ZIPNAME | cut -f1))"

      - name: Verify zip manifest
        run: |
          EXPECTED="lgw-division-widget.php lgw-scorecards.php lgw-scorecard.js lgw-scorecard.css lgw-cup.php lgw-cup.js lgw-cup.css lgw-champ.php lgw-champ.js lgw-champ.css lgw-draw.php lgw-gchamp.php lgw-gchamp.js lgw-gchamp.css lgw-widget.js lgw-widget.css lgw-admin.js lgw-admin.css lgw-sc-admin.php lgw-players.php lgw-drive.php lgw-sheets.php lgw-pdf.php lgw-finals.php lgw-finals.js lgw-finals.css lgw-logo.svg readme.txt README.md"
          MISSING=0
          for f in $EXPECTED; do
            if ! unzip -l "${{ env.ZIPNAME }}" | grep -q "$f"; then
              echo "❌ Missing from zip: $f"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then exit 1; fi
          COUNT=$(unzip -l "${{ env.ZIPNAME }}" | grep "lgw-division-widget/" | grep -v "/$" | wc -l)
          echo "✅ Zip manifest verified — $COUNT files"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk "/^= ${VERSION} =/{found=1; next} found && /^= /{exit} found{print}" readme.txt)
          if [ -z "$NOTES" ]; then
            NOTES="See readme.txt for changelog."
          fi
          echo "$NOTES" > release_notes.txt
          echo "✅ Extracted changelog for v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.txt
          files: ${{ env.ZIPNAME }}
          fail_on_unmatched_files: true
